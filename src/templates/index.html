<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>機材レンタル管理</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <header class="header">
        <h1>📸 機材レンタル管理</h1>
        <nav>
            <a href="/" class="nav-link active">レンタル管理</a>
            <a href="/equipment" class="nav-link">機材マスタ</a>
        </nav>
    </header>

    <main class="container">
        <!-- 画像解析エリア -->
        <section class="card image-section">
            <h2>📷 画像からレンタル登録</h2>
            <div class="image-upload-area" id="imageDropArea">
                <label for="imageFile" class="image-upload-label">
                    <span class="upload-icon">🖼️</span>
                    <span>画像を選択またはドロップ</span>
                    <span class="upload-hint">PNG / JPEG / BMP / TIFF</span>
                </label>
                <input type="file" id="imageFile" accept="image/png,image/jpeg,image/bmp,image/tiff" style="display:none;">
            </div>
            <div id="imagePreviewArea" style="display:none;">
                <img id="imagePreview" class="image-preview" alt="プレビュー">
                <button class="btn btn-outline" onclick="clearImage()">✕ クリア</button>
            </div>
            <div class="image-actions" style="margin-top:16px;">
                <button id="analyzeBtn" class="btn btn-primary" onclick="analyzeImage()" disabled>解析する</button>
            </div>
            <p id="imageAnalyzeMsg" class="action-msg" style="display:none;"></p>

            <!-- 解析結果エリア -->
            <div id="imageResultArea" style="display:none;">
                <hr>
                <h3 class="result-heading">解析結果 <span class="result-hint">（修正可能）</span></h3>

                <!-- レンタル中の場合の警告 -->
                <div id="imageConflictArea" class="conflict-box" style="display:none;">
                    <p class="conflict-title">⚠️ この機材は現在レンタル中です</p>
                    <div id="imageConflictDetail" class="conflict-detail"></div>
                </div>

                <div class="form-grid-single">
                    <div class="form-group">
                        <label for="imgProductCode">機材ID</label>
                        <input type="text" id="imgProductCode" placeholder="機材ID">
                    </div>
                </div>
                <div class="form-grid-single">
                    <div class="form-group">
                        <label for="imgBorrowerName">氏名</label>
                        <input type="text" id="imgBorrowerName" placeholder="氏名">
                    </div>
                </div>
                <div class="form-grid">
                    <div class="form-group">
                        <label for="imgRentalStart">開始日</label>
                        <input type="date" id="imgRentalStart">
                    </div>
                    <div class="form-group">
                        <label for="imgRentalEnd">終了日</label>
                        <input type="date" id="imgRentalEnd">
                    </div>
                </div>
                <div class="action-buttons">
                    <button id="imgRegisterBtn" class="btn btn-primary" onclick="registerFromImage()">このデータでレンタル登録</button>
                </div>
                <p id="imgRegisterMsg" class="action-msg" style="display:none;"></p>
            </div>
        </section>

        <!-- 検索エリア -->
        <section class="card search-section">
            <h2>🔍 商品コード検索</h2>
            <div class="search-bar">
                <input type="text" id="searchCode" placeholder="商品コードを入力" autocomplete="off">
                <button id="searchBtn" onclick="searchEquipment()">検索</button>
            </div>
            <p id="searchError" class="error-msg" style="display:none;"></p>
        </section>

        <!-- 検索結果・操作エリア（初期は非表示） -->
        <section id="resultSection" class="card result-section" style="display:none;">
            <div class="info-grid">
                <div class="info-item">
                    <label>商品名</label>
                    <span id="equipmentName" class="info-value"></span>
                </div>
                <div class="info-item">
                    <label>ステータス</label>
                    <span id="statusBadge" class="badge"></span>
                </div>
            </div>

            <hr>

            <form id="rentalForm" onsubmit="return false;">
                <input type="hidden" id="productCode" value="">
                <div class="form-grid-single">
                    <div class="form-group">
                        <label for="borrowerName">氏名（フルネーム推奨）</label>
                        <input type="text" id="borrowerName" placeholder="氏名を入力">
                    </div>
                </div>
                <div class="form-grid">
                    <div class="form-group">
                        <label for="rentalStart">開始日</label>
                        <input type="date" id="rentalStart">
                    </div>
                    <div class="form-group">
                        <label for="rentalEnd">終了日</label>
                        <input type="date" id="rentalEnd">
                    </div>
                </div>

                <div class="action-buttons">
                    <button id="rentalBtn" class="btn btn-primary" onclick="registerRental()">レンタル登録</button>
                    <button id="returnBtn" class="btn btn-secondary" onclick="processReturn()">返却</button>
                </div>
            </form>

            <p id="actionMessage" class="action-msg" style="display:none;"></p>
        </section>

        <!-- レンタル履歴エリア（初期は非表示） -->
        <section id="historySection" class="card history-section" style="display:none;">
            <h2>📋 レンタル履歴</h2>
            <table class="history-table">
                <thead>
                    <tr>
                        <th>氏名</th>
                        <th>開始日</th>
                        <th>終了日</th>
                        <th>ステータス</th>
                        <th>返却日時</th>
                    </tr>
                </thead>
                <tbody id="historyBody">
                </tbody>
            </table>
            <p id="noHistory" class="no-data" style="display:none;">履歴がありません</p>
        </section>
    </main>

    <script src="{{ url_for('static', filename='main.js') }}"></script>
</body>

</html>
